<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebMCP - API Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0f0f13;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 12px;
    }

    /* ── Top bar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
      flex-shrink: 0;
    }
    .toolbar h1 { font-size: 13px; font-weight: 600; color: #a78bfa; flex: 1; }
    .badge {
      background: #7c3aed;
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-danger { background: #991b1b; color: white; }
    .btn-ghost { background: #2d2d4e; color: #a0a0c0; }

    /* ── Status bar ── */
    .status-bar {
      padding: 6px 12px;
      background: #111127;
      border-bottom: 1px solid #2d2d4e;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: #6b7280;
      flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      flex-shrink: 0;
    }
    .status-dot.inactive { background: #4b5563; box-shadow: none; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #0f0f13;
      border-bottom: 1px solid #1a1a2e;
      flex-shrink: 0;
    }
    .filter-bar input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      color: #e2e8f0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      outline: none;
    }
    .filter-bar input:focus { border-color: #7c3aed; }

    /* ── Endpoint list ── */
    .endpoint-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }
    .endpoint-list::-webkit-scrollbar { width: 4px; }
    .endpoint-list::-webkit-scrollbar-track { background: transparent; }
    .endpoint-list::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 2px; }

    .endpoint-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      margin-bottom: 2px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .endpoint-item:hover { background: #1a1a2e; border-color: #2d2d4e; }
    .endpoint-item.selected { background: #1e1340; border-color: #7c3aed; }

    .method-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 1px;
      min-width: 36px;
      text-align: center;
    }
    .method-GET { background: #052e16; color: #86efac; }
    .method-POST { background: #1c1917; color: #fdba74; }
    .method-PUT { background: #1e1b4b; color: #a5b4fc; }
    .method-DELETE { background: #3b0000; color: #fca5a5; }
    .method-PATCH { background: #1a1a00; color: #fde047; }

    .ep-info { flex: 1; min-width: 0; }
    .ep-host { font-size: 10px; color: #6b7280; }
    .ep-path {
      font-size: 11px;
      color: #c4b5fd;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ep-meta { font-size: 10px; color: #4b5563; margin-top: 2px; }

    .ep-hit {
      font-size: 10px;
      color: #7c3aed;
      font-weight: 600;
      flex-shrink: 0;
      background: #1e1340;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ── Detail panel ── */
    .detail-panel {
      border-top: 1px solid #2d2d4e;
      background: #0d0d1a;
      flex-shrink: 0;
      max-height: 35%;
      display: none;
      flex-direction: column;
    }
    .detail-panel.open { display: flex; }
    .detail-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #2d2d4e;
      flex-shrink: 0;
    }
    .detail-tab {
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #6b7280;
      transition: color 0.1s;
    }
    .detail-tab.active { color: #a78bfa; border-bottom-color: #7c3aed; }
    .detail-tab:hover { color: #c4b5fd; }
    .detail-content {
      flex: 1;
      overflow: auto;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      color: #93c5fd;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
      color: #4b5563;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state h3 { font-size: 14px; color: #6b7280; }
    .empty-state p { font-size: 11px; line-height: 1.6; }

    /* ── Chat button ── */
    .open-chat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .open-chat-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>⚡ WebMCP</h1>
    <span class="badge" id="ep-count">0</span>
    <button class="btn btn-ghost" id="btn-refresh">↻ Refresh</button>
    <button class="btn btn-danger" id="btn-clear">✕ Clear</button>
    <button class="open-chat-btn" id="btn-chat">💬 Open Chat</button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Listening for API calls...</span>
    <span style="margin-left:auto" id="page-info"></span>
  </div>

  <div class="filter-bar">
    <input type="text" id="filter-input" placeholder="Filter by host, path, method..." />
    <select id="method-filter" style="background:#1a1a2e;color:#e2e8f0;border:1px solid #2d2d4e;padding:4px 6px;border-radius:6px;font-size:11px;outline:none;">
      <option value="">All</option>
      <option value="GET">GET</option>
      <option value="POST">POST</option>
      <option value="PUT">PUT</option>
      <option value="DELETE">DELETE</option>
    </select>
  </div>

  <div class="endpoint-list" id="endpoint-list">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 9l4-4 4 4m0 6l-4 4-4-4"/>
        <path d="M12 5v14"/>
      </svg>
      <h3>No API calls captured yet</h3>
      <p>Navigate the page to capture<br>API calls automatically.<br><br>JSON/XHR requests will appear here.</p>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-tabs">
      <div class="detail-tab active" data-tab="schema">MCP Schema</div>
      <div class="detail-tab" data-tab="headers">Headers</div>
      <div class="detail-tab" data-tab="response">Sample Response</div>
    </div>
    <div class="detail-content" id="detail-content"></div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
